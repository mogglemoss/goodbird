<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f7faf6"/>
      <stop offset="0.55" stop-color="#f1ede2"/>
      <stop offset="1" stop-color="#dfeada"/>
    </linearGradient>
  </defs>

  <!-- Background gradient -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Tiny decorative birds, upper-left -->
  <g stroke="#2f5a3f" stroke-opacity="0.30" stroke-width="2" fill="none" stroke-linecap="round">
    <path d="M120 130 q 14 -16, 28 0 q 14 -16, 28 0"/>
    <path d="M210 92 q 10 -12, 20 0 q 10 -12, 20 0"/>
    <path d="M310 154 q 8 -10, 16 0 q 8 -10, 16 0"/>
  </g>

  <!-- Top mono caps label -->
  <text x="600" y="200"
        text-anchor="middle"
        font-family="Geist Mono, ui-monospace, Menlo, monospace"
        font-size="24"
        letter-spacing="6"
        fill="#5b6c63">
    WEST MARIN · EAR TRAINING
  </text>

  <!-- Wordmark: matches the runtime header (Wordmark.tsx) — gap-0, slight
       overlap between bird beak and the 'g', baseline-aligned, tracking-tight.
       Bird is positioned so its body bottom sits ~3px below the text baseline
       (the runtime's translate-y-[3px]).
       Bird viewBox is 28×24; at scale(5) the bird is 140×120 OG-units.
       Body bottom is at viewBox y=19 → scaled y=95. Text baseline at y=358,
       so bird translateY = 358 + 15 (≈3px scaled by 5) - 95 = 278. -->
  <g transform="translate(232 278) scale(5)" fill="#2f5a3f">
    <!-- Cocked tail -->
    <path d="M 8 16 C 6 13, 4 10, 3 5 C 4 5, 5 6, 6 8 C 7 11, 8 13, 9 15 Z"/>
    <!-- Body -->
    <path d="M 7 14 C 7 18, 11 19, 15 19 C 19 19, 22 18, 23 15 C 24 12, 23 10, 21 9 C 18 7, 13 7, 10 9 C 7 11, 7 13, 7 14 Z"/>
    <!-- Head -->
    <circle cx="20.5" cy="10" r="3.6"/>
    <!-- Beak -->
    <path d="M 23.6 10 L 27.4 9.6 L 23.6 11.2 Z"/>
    <!-- Eye -->
    <circle cx="21.6" cy="9.6" r="0.65" fill="#f7faf6"/>
  </g>

  <!-- Wordmark text — beak tip is at x = 330 + 27.4*5 = 467; text starts
       slightly inside that for the runtime's overlap (mirrors -ms-1 = -4px,
       scaled by 5 = -20px). -->
  <text x="357" y="358"
        font-family="Fraunces, Georgia, serif"
        font-weight="500"
        font-size="124"
        letter-spacing="-3"
        fill="#2f5a3f">
    goodbird
  </text>

  <!-- Subhead -->
  <text x="600" y="430"
        text-anchor="middle"
        font-family="Fraunces, Georgia, serif"
        font-weight="500"
        font-size="44"
        letter-spacing="-0.5"
        fill="#0d1f15">
    A field guide you can hear.
  </text>

  <!-- Coordinates -->
  <text x="600" y="478"
        text-anchor="middle"
        font-family="Geist Mono, ui-monospace, Menlo, monospace"
        font-size="20"
        letter-spacing="6"
        fill="#5b6c63">
    38°02′N · 122°42′W
  </text>

  <!-- Layered rolling hills along the bottom -->
  <g>
    <!-- Far hills, palest -->
    <path
      d="M0 530 C 180 490, 360 540, 540 510 C 720 480, 900 530, 1080 510 L 1200 515 L 1200 630 L 0 630 Z"
      fill="#cfdac7" fill-opacity="0.55"/>
    <!-- Mid hills -->
    <path
      d="M0 560 C 150 530, 330 580, 510 555 C 690 528, 870 575, 1050 552 L 1200 555 L 1200 630 L 0 630 Z"
      fill="#a9bd9c" fill-opacity="0.65"/>
    <!-- Near hills -->
    <path
      d="M0 595 C 120 580, 300 605, 480 590 C 660 575, 840 600, 1020 588 L 1200 590 L 1200 630 L 0 630 Z"
      fill="#7a9466" fill-opacity="0.55"/>
  </g>
</svg>
